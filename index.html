<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOMBIE MATH APOCALYPSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00aa2a;
    --red: #ff2222;
    --amber: #ffaa00;
    --bg: #060a06;
    --cabinet-dark: #0d120d;
    --cabinet-mid: #141a14;
    --cabinet-light: #1e261e;
    --bezel: #0a2a0a;
    --screen-border: #003300;
    --scanline: rgba(0,0,0,0.18);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'Orbitron', monospace;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px 16px 40px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,65,0.015) 2px,
        rgba(0,255,65,0.015) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  .page-header {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .dev-badge {
    display: inline-block;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--amber);
    border: 1px solid var(--amber);
    padding: 6px 12px;
    letter-spacing: 1px;
    margin-bottom: 14px;
    animation: badgePulse 2s ease-in-out infinite;
    text-transform: uppercase;
  }

  @keyframes badgePulse {
    0%, 100% { opacity: 1; border-color: var(--amber); }
    50% { opacity: 0.6; border-color: #664400; }
  }

  .main-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 2.5vw, 20px);
    color: var(--green);
    letter-spacing: 2px;
    text-shadow:
      0 0 10px var(--green),
      0 0 30px var(--green-dim),
      0 0 60px rgba(0,255,65,0.2);
    line-height: 1.6;
    margin-bottom: 4px;
    animation: titleFlicker 8s infinite;
  }

  @keyframes titleFlicker {
    0%, 94%, 96%, 100% { opacity: 1; }
    95% { opacity: 0.7; }
  }

  .subtitle {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 3px;
    font-family: 'Orbitron', monospace;
    font-weight: 400;
  }

  .cabinet {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 920px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cabinet-top {
    width: 88%;
    height: 28px;
    background: linear-gradient(180deg, #1a2a1a 0%, #0d1a0d 100%);
    border: 2px solid #2a4a2a;
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .marquee-light {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 6px var(--amber);
    animation: marqueeAnim 0.6s ease-in-out infinite alternate;
  }
  .marquee-light:nth-child(2) { animation-delay: 0.1s; background: var(--red); box-shadow: 0 0 6px var(--red); }
  .marquee-light:nth-child(3) { animation-delay: 0.2s; }
  .marquee-light:nth-child(4) { animation-delay: 0.3s; background: var(--red); box-shadow: 0 0 6px var(--red); }
  .marquee-light:nth-child(5) { animation-delay: 0.4s; }
  .marquee-light:nth-child(6) { animation-delay: 0.1s; background: var(--red); box-shadow: 0 0 6px var(--red); }
  .marquee-light:nth-child(7) { animation-delay: 0.2s; }
  .marquee-light:nth-child(8) { animation-delay: 0.3s; background: var(--red); box-shadow: 0 0 6px var(--red); }
  .marquee-light:nth-child(9) { animation-delay: 0.4s; }

  @keyframes marqueeAnim {
    from { opacity: 0.3; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .cabinet-body {
    width: 100%;
    background: linear-gradient(180deg, #0d1a0d 0%, #0a140a 50%, #080e08 100%);
    border: 2px solid #1a3a1a;
    border-top: none;
    border-bottom: none;
    padding: 20px 24px;
    display: flex;
    justify-content: center;
    position: relative;
  }

  .cabinet-body::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 18px;
    background: linear-gradient(90deg, #040804, #0d1a0d);
    border-right: 1px solid #1a3a1a;
  }

  .cabinet-body::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 18px;
    background: linear-gradient(270deg, #040804, #0d1a0d);
    border-left: 1px solid #1a3a1a;
  }

  .screen-bezel {
    width: 100%;
    max-width: 860px;
    background: #060a06;
    border: 4px solid #1a3a1a;
    border-radius: 8px;
    padding: 14px;
    position: relative;
    box-shadow:
      0 0 0 1px #0a1a0a,
      0 0 40px rgba(0,255,65,0.08) inset,
      0 0 80px rgba(0,255,65,0.04);
  }

  .screen-bezel::before {
    content: 'INSERT COIN TO CONTINUE';
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #2a5a2a;
    letter-spacing: 2px;
    white-space: nowrap;
    animation: coinFlicker 1.2s step-end infinite;
  }

  @keyframes coinFlicker {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  .screen-inner {
    position: relative;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    background: #000;
  }

  .screen-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline),
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 10;
    border-radius: 4px;
  }

  .game-frame {
    width: 100%;
    aspect-ratio: 4/3;
    border: none;
    display: block;
    background: #000;
  }

  .screen-glare {
    position: absolute;
    top: 0; left: 0;
    width: 40%;
    height: 35%;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 11;
    border-radius: 4px 0 0 0;
  }

  .cabinet-control-panel {
    width: 100%;
    background: linear-gradient(180deg, #0a1a0a 0%, #060e06 100%);
    border: 2px solid #1a3a1a;
    border-top: 3px solid #2a5a2a;
    border-bottom: none;
    padding: 18px 40px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    position: relative;
  }

  .joystick-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .joystick-base {
    width: 44px;
    height: 44px;
    background: radial-gradient(circle at 35% 35%, #2a2a2a, #0a0a0a);
    border-radius: 50%;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .joystick-stick {
    width: 16px;
    height: 16px;
    background: radial-gradient(circle at 35% 35%, #444, #111);
    border-radius: 50%;
    border: 1px solid #555;
    animation: stickWobble 3s ease-in-out infinite;
  }

  @keyframes stickWobble {
    0%, 100% { transform: translate(0,0); }
    25% { transform: translate(2px, -2px); }
    50% { transform: translate(0, 2px); }
    75% { transform: translate(-2px, -1px); }
  }

  .wasd-hint {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #2a5a2a;
    line-height: 2;
    text-align: center;
  }

  .center-label {
    text-align: center;
    flex: 1;
  }

  .made-by {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #2a6a2a;
    letter-spacing: 1px;
    line-height: 2;
  }

  .buttons-area {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .arcade-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.5);
    cursor: pointer;
    position: relative;
    animation: btnIdle 2s ease-in-out infinite alternate;
  }

  .arcade-btn.red { background: radial-gradient(circle at 35% 30%, #ff5555, #880000); box-shadow: 0 0 8px #ff000055; }

  .yell {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(28px, 8vw, 72px);
    color: var(--red);
    text-shadow: 0 0 20px var(--red), 0 0 60px rgba(255,34,34,0.5);
    pointer-events: none;
    z-index: 9999;
    white-space: nowrap;
    opacity: 0;
    letter-spacing: 4px;
  }

  .yell.pop {
    animation: yellPop 1.2s ease-out forwards;
  }

  @keyframes yellPop {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.4) rotate(-4deg); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(2deg); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(0.95) rotate(-1deg); }
    35%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05) rotate(0deg); }
    60%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2) rotate(0deg); }
  }
  .arcade-btn.amber { background: radial-gradient(circle at 35% 30%, #ffcc44, #886600); box-shadow: 0 0 8px #ffaa0055; animation-delay: 0.3s; }
  .arcade-btn.green { background: radial-gradient(circle at 35% 30%, #44ff66, #006622); box-shadow: 0 0 8px #00ff4155; animation-delay: 0.6s; }

  @keyframes btnIdle {
    from { filter: brightness(0.8); }
    to { filter: brightness(1.1); }
  }

  .cabinet-bottom {
    width: 88%;
    height: 24px;
    background: linear-gradient(180deg, #080e08 0%, #040804 100%);
    border: 2px solid #1a3a1a;
    border-top: none;
    border-radius: 0 0 10px 10px;
  }

  .page-footer {
    margin-top: 40px;
    text-align: center;
    position: relative;
    z-index: 1;
    max-width: 760px;
    padding: 0 16px;
  }

  .brag-box {
    border: 1px solid #1a5a1a;
    padding: 24px 32px;
    position: relative;
    background: rgba(0, 255, 65, 0.02);
  }

  .brag-box::before {
    content: '// DEVLOG ENTRY #001';
    position: absolute;
    top: -8px;
    left: 20px;
    background: var(--bg);
    padding: 0 8px;
    font-size: 9px;
    color: #2a6a2a;
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 1px;
  }

  .brag-text {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1.8vw, 12px);
    line-height: 2.2;
    color: var(--green);
    text-shadow: 0 0 8px rgba(0,255,65,0.3);
    letter-spacing: 1px;
  }

  .brag-text .highlight {
    color: var(--amber);
    text-shadow: 0 0 8px rgba(255,170,0,0.4);
  }

  .brag-text .him {
    color: var(--red);
    font-size: clamp(10px, 2.2vw, 16px);
    text-shadow: 0 0 12px rgba(255,34,34,0.6);
    animation: himPulse 1s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes himPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 3vw, 24px);
    color: var(--green);
    display: block;
    text-shadow: 0 0 12px var(--green);
    counter-reset: none;
  }

  .stat-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: #2a6a2a;
    letter-spacing: 2px;
    margin-top: 4px;
    display: block;
    text-transform: uppercase;
  }

  .corner-decoration {
    position: absolute;
    width: 10px;
    height: 10px;
    border-color: #1a5a1a;
    border-style: solid;
  }
  .corner-decoration.tl { top: 4px; left: 4px; border-width: 1px 0 0 1px; }
  .corner-decoration.tr { top: 4px; right: 4px; border-width: 1px 1px 0 0; }
  .corner-decoration.bl { bottom: 4px; left: 4px; border-width: 0 0 1px 1px; }
  .corner-decoration.br { bottom: 4px; right: 4px; border-width: 0 1px 1px 0; }

  @media (max-width: 600px) {
    .cabinet-control-panel { padding: 14px 20px; gap: 12px; }
    .center-label { display: none; }
    .brag-box { padding: 18px 16px; }
    .stats-row { gap: 20px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="dev-badge">&#9654; NOW PLAYING &#9654;</div>
  <div class="main-title">ZOMBIE MATH<br>APOCALYPSE</div>
  <div class="subtitle">ARCADE EDITION</div>
</div>

<div class="cabinet">

  <div class="cabinet-top">
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
    <div class="marquee-light"></div>
  </div>

  <div class="cabinet-body">
    <div class="screen-bezel">
      <div class="screen-inner">
        <iframe
          class="game-frame"
          src="zombie_math_apocalypse_final.html"
          title="Zombie Math Apocalypse"
          allowfullscreen
        ></iframe>
        <div class="screen-glare"></div>
      </div>
    </div>
  </div>

  <div class="cabinet-control-panel">
    <div class="joystick-area">
      <div class="joystick-base">
        <div class="joystick-stick"></div>
      </div>
      <div class="wasd-hint">W<br>ASD<br>MOVE</div>
    </div>

    <div class="center-label">
      <div class="made-by">
        DEVELOPED BY: DLR THE DOPE BOY<br>
        <span style="color:#1a4a1a;">&#9679; &#9679; &#9679; SHIPPED 4/20/67 &#9679; &#9679; &#9679;</span>
      </div>
    </div>

    <div class="buttons-area">
      <div class="arcade-btn red" title="SHOOT"></div>
      <div class="arcade-btn amber" title="PAUSE"></div>
      <div class="arcade-btn green" title="START"></div>
    </div>
  </div>

  <div class="cabinet-bottom"></div>

</div>

<div class="page-footer">
  <div class="brag-box">
    <div class="corner-decoration tl"></div>
    <div class="corner-decoration tr"></div>
    <div class="corner-decoration bl"></div>
    <div class="corner-decoration br"></div>

    <div class="brag-text">
      I'M A GAME DEV.<br>
      <span class="highlight">I TOLD YOU SO.</span><br>
      I SHIPPED THE GAME.<br>
      DON'T EVER DOUBT ME<br>
      CAUSE I AM....<br>
      AS YOU KIDS SAY....<br>
      <span class="him">&#9733; HIM &#9733;</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <span class="stat-num">9</span>
      <span class="stat-label">LEVELS</span>
    </div>
    <div class="stat">
      <span class="stat-num">9</span>
      <span class="stat-label">WEAPONS</span>
    </div>
    <div class="stat">
      <span class="stat-num">9</span>
      <span class="stat-label">BOSS FIGHTS</span>
    </div>
    <div class="stat">
      <span class="stat-num">&#8734;</span>
      <span class="stat-label">MATH PROBLEMS</span>
    </div>
  </div>
</div>

<div class="yell" id="yellDiv">NAGGERS!</div>

<script>
  const yellDiv = document.getElementById('yellDiv');
  document.querySelector('.arcade-btn.red').addEventListener('click', () => {
    yellDiv.classList.remove('pop');
    void yellDiv.offsetWidth;
    yellDiv.classList.add('pop');
  });
</script>

</body>
</html>
